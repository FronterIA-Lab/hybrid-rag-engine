```yaml
services:
  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports: ["6333:6333"]
    volumes: ["./qdrant_data:/qdrant/storage"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_healthy
    volumes: ["./data:/app/data"]

  ui:
    build:
      context: .
      target: ui
    ports: ["8501:8501"]
    environment:
      API_URL: http://api:8000
    depends_on: [api]
```
